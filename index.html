<!DOCTYPE html>
<html lang="fr">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <meta
        name="description"
        content="MeteoSignal - La météo, partout avec vous.">

    <meta
        name="theme-color"
        content="#0b1d33">

    <title>MeteoSignal</title>

    <link
        rel="manifest"
        href="manifest.json">

    <link
        rel="icon"
        href="logo/logo.png">

    <link
        rel="stylesheet"
        href="css/style.css">

</head>

<body>

<div class="app">

  
<header class="topbar">

    <div class="logo">
        🌦️ MeteoSignal
    </div>

    <div class="search">

        <input
            type="text"
            placeholder="Rechercher une ville..."
        >

    </div>

    <div class="header-actions">

        <button title="Favoris">⭐</button>

        <button title="Paramètres">⚙️</button>

    </div>

</header>

  
<main class="dashboard">

    <!-- =========================
         HERO - Conditions actuelles
    ========================== -->
<section class="hero">

    <div class="hero-top">

        <div id="clock">--:--</div>

        <div class="last-update">
            Mise à jour automatique
        </div>

    </div>

    <div id="icon">
        ☀️
    </div>

    <h1 id="city">
        MeteoSignal
    </h1>

    <div id="temp">
        --°
    </div>

    <p id="description">
        Chargement...
    </p>

    <div class="hero-details">

        <div class="detail">

            <span>🌡 Ressenti</span>

            <strong id="feels-like">
                --°
            </strong>

        </div>

        <div class="detail">

            <span>⬇ Min</span>

            <strong id="temp-min">
                --°
            </strong>

        </div>

        <div class="detail">

            <span>⬆ Max</span>

            <strong id="temp-max">
                --°
            </strong>

        </div>

    </div>

</section>

    <!-- =========================
         WEATHER GRID
    ========================== -->
    <section class="weather-grid">

        <article class="card">
            <h2>💨 Vent</h2>
            <p><span id="wind">--</span></p>
        </article>

        <article class="card">
            <h2>💧 Humidité</h2>
            <p><span id="humidity">--</span></p>
        </article>

        <article class="card">
            <h2>🌡️ Pression</h2>
            <p><span id="pressure">-- hPa</span></p>
        </article>

        <article class="card">
            <h2>🌧️ Précipitations</h2>
            <p><span id="precipitation">-- mm</span></p>
        </article>

    </section>

    <!-- =========================
         HOURLY FORECAST
    ========================== -->
    <section class="hourly">

        <h2>Prévisions horaires</h2>

    </section>

    <!-- =========================
         WEEK FORECAST
    ========================== -->
    <section class="weekly">

        <h2>Prévisions sur 7 jours</h2>

        <div id="forecast"></div>

    </section>

</main>

<footer id="version"></footer>

<script src="config/config.js"></script>
<script src="js/clock.js"></script>
<script src="js/weather.js"></script>
<script src="js/app.js"></script>

</body>
</html>
