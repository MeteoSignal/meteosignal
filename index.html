<!DOCTYPE html>
<html lang="fr">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1">

<title>MeteoSignal</title>

<link rel="stylesheet" href="css/style.css">

<link rel="manifest" href="manifest.json">
  
</head>


<body>

  
<header class="topbar">

    <div class="logo">
        🌦️ <span>MeteoSignal</span>
    </div>

    <div class="location">
        📍 <span id="city-header">Toulouse</span>
    </div>

    <div class="actions">

        <button class="icon-button" title="Rechercher">
            🔍
        </button>

        <button class="icon-button" title="Favoris">
            ⭐
        </button>

        <button class="icon-button" title="Paramètres">
            ⚙️
        </button>

    </div>

</header>

  
<main class="dashboard">

    <!-- =========================
         HERO - Conditions actuelles
    ========================== -->
    <section class="hero">

        <div id="clock">--:--</div>

        <h1 id="city">MeteoSignal</h1>

        <div id="icon">☀️</div>

        <div id="temp">--°</div>

        <p id="description">Chargement...</p>

    </section>

    <!-- =========================
         WEATHER GRID
    ========================== -->
    <section class="weather-grid">

        <article class="card">
            <h2>💨 Vent</h2>
            <p><span id="wind">--</span></p>
        </article>

        <article class="card">
            <h2>💧 Humidité</h2>
            <p><span id="humidity">--</span></p>
        </article>

        <article class="card">
            <h2>🌡️ Pression</h2>
            <p><span id="pressure">-- hPa</span></p>
        </article>

        <article class="card">
            <h2>🌧️ Précipitations</h2>
            <p><span id="precipitation">-- mm</span></p>
        </article>

    </section>

    <!-- =========================
         HOURLY FORECAST
    ========================== -->
    <section class="hourly">

        <h2>Prévisions horaires</h2>

    </section>

    <!-- =========================
         WEEK FORECAST
    ========================== -->
    <section class="weekly">

        <h2>Prévisions sur 7 jours</h2>

        <div id="forecast"></div>

    </section>

</main>

<footer id="version"></footer>

<script src="config/config.js"></script>
<script src="js/clock.js"></script>
<script src="js/weather.js"></script>
<script src="js/app.js"></script>

</body>
</html>
