name: CI

on:
  pull_request:
    branches:
      - main
  push:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Validate MeteoSignal
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Set up Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          package-manager-cache: false

      - name: Show runtime versions
        run: |
          node --version
          npm --version

      - name: Check changed-file whitespace
        env:
          EVENT_NAME: ${{ github.event_name }}
          BASE_SHA: ${{ github.event.pull_request.base.sha }}
          BEFORE_SHA: ${{ github.event.before }}
        run: |
          if [ "$EVENT_NAME" = "pull_request" ]; then
            git diff --check "$BASE_SHA...HEAD"
          elif [ -z "$BEFORE_SHA" ] || printf '%s' "$BEFORE_SHA" | grep -Eq '^0+$'; then
            git diff-tree --check --root -r HEAD
          else
            git diff --check "$BEFORE_SHA..HEAD"
          fi

      - name: Check JavaScript syntax
        run: |
          find . -type f \( -name '*.js' -o -name '*.mjs' \) \
            -not -path './.git/*' \
            -not -path './node_modules/*' \
            -print0 | xargs -0 -r -n1 node --check

      - name: Run unit tests
        run: npm test
